<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge Preview</title>
    <link rel="stylesheet" href="../assets/css/app.css?v=20260430d" />
    <script src="../assets/js/ui/player_badge.js?v=20260430v3"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(0.5rem, 3vw, 2rem);
        background:
          linear-gradient(180deg, rgba(8, 16, 28, 0.96), rgba(7, 12, 20, 1)),
          #08111c;
      }

      .preview-shell {
        width: min(100%, 32rem);
        display: grid;
        justify-items: center;
      }
    </style>
  </head>
  <body class="public-app page-roster">
    <div class="preview-shell badge-preview fut-card-shell" id="preview-shell"></div>
    <script>
      const previewShell = document.getElementById("preview-shell");
      const example = window.mcPlayerBadgeExample;
      if (previewShell && example && window.mountPlayerBadge) {
        window.mountPlayerBadge(previewShell, example.player, example.stats, {
          showTrophy: true,
        });
      }
    </script>
  </body>
</html>
