<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge Preview</title>
    <link rel="stylesheet" href="../assets/css/app.css?v=20260430a" />
    <script src="../assets/js/ui/player_badge.js?v=20260430a"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          linear-gradient(180deg, rgba(8, 16, 28, 0.96), rgba(7, 12, 20, 1)),
          #08111c;
      }

      .preview-shell {
        width: min(100%, 36rem);
        padding: 2rem 2rem 2.4rem;
        border-radius: 1.8rem;
        border: 1px solid rgba(110, 145, 187, 0.22);
        background: rgba(15, 26, 42, 0.84);
        color: #edf4ff;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }

      .preview-shell .list-item-title {
        color: #f8fbff;
      }

      .preview-shell .compact-row-copy {
        color: #b6c5d8;
      }
    </style>
  </head>
  <body class="public-app page-roster">
    <div class="preview-shell">
      <article class="list-item roster-player-card expanded">
        <div class="roster-player-header">
          <div class="roster-player-header-copy">
            <div class="list-item-title">Asdruval Villanueva</div>
            <div class="compact-row-copy">Mexico · DEF · ATT · GK</div>
          </div>
          <div class="list-actions">
            <button class="secondary-button" type="button">Hide</button>
          </div>
        </div>
        <div class="roster-inline-detail" id="preview-shell"></div>
      </article>
    </div>
    <script>
      const previewShell = document.getElementById("preview-shell");
      const example = window.mcPlayerBadgeExample;
      if (previewShell && example && window.mountPlayerBadge) {
        const summaryValue = (value) => {
          const number = Number(value || 0);
          return Number.isFinite(number) ? String(Math.round(number)) : "0";
        };
        const ppgValue = Number(example.stats?.points_per_game || 0);
        const summaryCards = [
          {
            key: "season",
            label: "Seasons",
            icon: "season",
            value: "8",
            formattedValue: "8",
          },
          {
            key: "record",
            label: "Record",
            icon: "record",
            value: `${summaryValue(example.stats?.wins)}-${summaryValue(example.stats?.draws)}-${summaryValue(example.stats?.losses)}`,
            formattedValue: `${summaryValue(example.stats?.wins)}-${summaryValue(example.stats?.draws)}-${summaryValue(example.stats?.losses)}`,
            valueKind: "compact",
          },
          {
            key: "ppg",
            label: "PPG",
            icon: "ppg",
            value: Number.isFinite(ppgValue) ? ppgValue.toFixed(2) : "0.00",
            formattedValue: Number.isFinite(ppgValue) ? ppgValue.toFixed(2) : "0.00",
            valueKind: "compact",
          },
          {
            key: "apps",
            label: "Apps",
            icon: "apps",
            value: summaryValue(example.stats?.apps),
            formattedValue: summaryValue(example.stats?.apps),
          },
        ];

        previewShell.innerHTML = `
          <div class="player-badge-share-card">
            <button class="secondary-button player-badge-share-button" type="button">Share Badge</button>
            <div class="roster-player-badge"></div>
          </div>
        `;

        const badgeHost = previewShell.querySelector(".roster-player-badge");
        if (badgeHost) {
          window.mountPlayerBadge(badgeHost, example.player, example.stats, {
            summaryCards,
            showTrophy: false,
          });
        }
      }
    </script>
  </body>
</html>
